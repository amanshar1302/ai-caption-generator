[build]
  command = "npm install --legacy-peer-deps --ignore-scripts && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
  node_bundler = "nft"
  external_node_modules = ["canvas"]

[[plugins]]
  package = "@netlify/plugin-nextjs"
